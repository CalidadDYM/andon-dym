<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ANDON — DYM Stamping Solutions</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --verde: #00C96B;
  --rojo: #FF3B3B;
  --amarillo: #FFB800;
  --azul: #1263AD;
  --cyan: #00ADEE;
  --gris: #4A4C50;
  --fondo: #0A0C10;
  --fondo2: #111318;
  --fondo3: #1A1D24;
  --borde: #2A2D35;
  --texto: #E8EAF0;
  --texto2: #8A8D96;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Barlow', sans-serif;
  background: var(--fondo);
  color: var(--texto);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
header {
  background: var(--fondo2);
  border-bottom: 2px solid var(--azul);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 1px;
  color: #fff;
}
.logo span { color: var(--cyan); }

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.reloj {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--cyan);
  letter-spacing: 2px;
}

.btn-reportar {
  background: var(--azul);
  color: #fff;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-reportar:hover { background: var(--cyan); color: #000; }

/* ── TABS ── */
.tabs {
  display: flex;
  background: var(--fondo2);
  border-bottom: 1px solid var(--borde);
  padding: 0 20px;
  gap: 4px;
}
.tab {
  padding: 12px 20px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: var(--texto2);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
}
.tab.activa {
  color: var(--cyan);
  border-bottom-color: var(--cyan);
}

/* ── KPI BAR ── */
.kpi-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--borde);
  border-bottom: 1px solid var(--borde);
}
.kpi {
  background: var(--fondo2);
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.kpi-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 36px;
  font-weight: 900;
  line-height: 1;
}
.kpi-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--texto2);
  letter-spacing: 0.5px;
  margin-top: 4px;
  text-transform: uppercase;
}
.kpi-num.verde { color: var(--verde); }
.kpi-num.rojo  { color: var(--rojo); }
.kpi-num.amarillo { color: var(--amarillo); }
.kpi-num.cyan  { color: var(--cyan); }

/* ── CONTENIDO ── */
.contenido { padding: 20px; }

/* ── GRID PRENSAS ── */
.grid-prensas {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 10px;
}

.prensa-card {
  background: var(--fondo3);
  border: 1.5px solid var(--borde);
  border-radius: 10px;
  padding: 14px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s;
  position: relative;
  overflow: hidden;
}
.prensa-card:hover {
  transform: translateY(-2px);
}
.prensa-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  border-radius: 10px 10px 0 0;
}

.prensa-card.estado-ok { border-color: var(--verde); box-shadow: 0 0 12px rgba(0,201,107,0.15); }
.prensa-card.estado-ok::before { background: var(--verde); }

.prensa-card.estado-paro { border-color: var(--rojo); box-shadow: 0 0 12px rgba(255,59,59,0.25); animation: parpadeo 1s infinite; }
.prensa-card.estado-paro::before { background: var(--rojo); }

.prensa-card.estado-scrap { border-color: var(--amarillo); box-shadow: 0 0 12px rgba(255,184,0,0.2); }
.prensa-card.estado-scrap::before { background: var(--amarillo); }

.prensa-card.estado-ayuda { border-color: var(--cyan); box-shadow: 0 0 12px rgba(0,173,238,0.2); animation: parpadeo 0.8s infinite; }
.prensa-card.estado-ayuda::before { background: var(--cyan); }

@keyframes parpadeo {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.6; }
}

.prensa-numero {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 28px;
  font-weight: 900;
  color: #fff;
  line-height: 1;
}
.prensa-nombre {
  font-size: 11px;
  color: var(--texto2);
  text-align: center;
}
.prensa-estado-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
}
.estado-ok    .prensa-estado-dot { background: var(--verde); }
.estado-paro  .prensa-estado-dot { background: var(--rojo); }
.estado-scrap .prensa-estado-dot { background: var(--amarillo); }
.estado-ayuda .prensa-estado-dot { background: var(--cyan); }

.prensa-tiempo {
  font-size: 10px;
  color: var(--texto2);
}

/* ── LEYENDA ── */
.leyenda {
  display: flex;
  gap: 20px;
  padding: 12px 20px;
  background: var(--fondo2);
  border-bottom: 1px solid var(--borde);
  flex-wrap: wrap;
}
.ley-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--texto2);
}
.ley-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
}

/* ── HISTORIAL ── */
.historial-lista {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.evento-item {
  background: var(--fondo3);
  border: 1px solid var(--borde);
  border-radius: 8px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.evento-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 6px;
  letter-spacing: 0.5px;
  min-width: 70px;
  text-align: center;
}
.badge-paro  { background: rgba(255,59,59,0.2);  color: var(--rojo); }
.badge-scrap { background: rgba(255,184,0,0.2);  color: var(--amarillo); }
.badge-ayuda { background: rgba(0,173,238,0.2);  color: var(--cyan); }
.badge-ok    { background: rgba(0,201,107,0.2);  color: var(--verde); }

.evento-info { flex: 1; }
.evento-prensa { font-weight: 600; font-size: 14px; }
.evento-desc { font-size: 12px; color: var(--texto2); margin-top: 2px; }
.evento-tiempo { font-size: 11px; color: var(--texto2); white-space: nowrap; }

.resuelto-badge {
  font-size: 10px;
  background: rgba(0,201,107,0.15);
  color: var(--verde);
  padding: 2px 8px;
  border-radius: 4px;
}

/* ── MODAL REPORTAR ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.overlay.activa { display: flex; }

.modal {
  background: var(--fondo2);
  border: 1px solid var(--borde);
  border-radius: 16px;
  width: 100%;
  max-width: 480px;
  padding: 28px;
  position: relative;
}
.modal-titulo {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 24px;
  font-weight: 900;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.modal-sub {
  font-size: 13px;
  color: var(--texto2);
  margin-bottom: 24px;
}

.campo {
  margin-bottom: 16px;
}
.campo label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--texto2);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.campo select,
.campo input,
.campo textarea {
  width: 100%;
  background: var(--fondo3);
  border: 1.5px solid var(--borde);
  border-radius: 8px;
  color: var(--texto);
  font-family: 'Barlow', sans-serif;
  font-size: 15px;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.2s;
}
.campo select:focus,
.campo input:focus,
.campo textarea:focus {
  border-color: var(--cyan);
}
.campo textarea { resize: vertical; min-height: 70px; }

/* Botones tipo selección */
.tipo-btns {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.tipo-btn {
  background: var(--fondo3);
  border: 2px solid var(--borde);
  border-radius: 10px;
  padding: 14px 10px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  color: var(--texto2);
}
.tipo-btn:hover { border-color: var(--texto2); color: var(--texto); }
.tipo-btn.sel-paro  { border-color: var(--rojo);     color: var(--rojo);     background: rgba(255,59,59,0.1); }
.tipo-btn.sel-scrap { border-color: var(--amarillo);  color: var(--amarillo); background: rgba(255,184,0,0.1); }
.tipo-btn.sel-ayuda { border-color: var(--cyan);      color: var(--cyan);     background: rgba(0,173,238,0.1); }
.tipo-btn.sel-ok    { border-color: var(--verde);     color: var(--verde);    background: rgba(0,201,107,0.1); }
.tipo-icono { font-size: 26px; line-height: 1; margin-bottom: 4px; }
.tipo-label { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.5px; }

.modal-btns {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}
.btn-cancelar {
  flex: 1;
  background: transparent;
  border: 1.5px solid var(--borde);
  color: var(--texto2);
  padding: 12px;
  border-radius: 8px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: border-color 0.2s;
}
.btn-cancelar:hover { border-color: var(--texto); color: var(--texto); }
.btn-enviar {
  flex: 2;
  background: var(--azul);
  border: none;
  color: #fff;
  padding: 12px;
  border-radius: 8px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-enviar:hover { background: var(--cyan); color: #000; }
.btn-enviar:disabled { background: var(--borde); color: var(--texto2); cursor: not-allowed; }

/* ── MODAL DETALLE PRENSA ── */
.modal-detalle { max-width: 520px; }
.detalle-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}
.detalle-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 56px;
  font-weight: 900;
  line-height: 1;
}
.detalle-info h2 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px;
  font-weight: 700;
}
.detalle-info p { font-size: 13px; color: var(--texto2); }

.detalle-estado {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  border-radius: 10px;
  margin-bottom: 20px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.5px;
}
.detalle-estado.ok    { background: rgba(0,201,107,0.1);  color: var(--verde); }
.detalle-estado.paro  { background: rgba(255,59,59,0.1);  color: var(--rojo); }
.detalle-estado.scrap { background: rgba(255,184,0,0.1);  color: var(--amarillo); }
.detalle-estado.ayuda { background: rgba(0,173,238,0.1);  color: var(--cyan); }

.detalle-eventos h3 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--texto2);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.detalle-evento {
  background: var(--fondo3);
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 6px;
  font-size: 13px;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--fondo2);
  border: 1px solid var(--verde);
  color: var(--verde);
  padding: 12px 24px;
  border-radius: 10px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.5px;
  z-index: 300;
  transition: transform 0.3s ease;
}
.toast.visible { transform: translateX(-50%) translateY(0); }
.toast.error { border-color: var(--rojo); color: var(--rojo); }

/* ── CERRAR MODAL ── */
.btn-cerrar {
  position: absolute;
  top: 16px; right: 16px;
  background: transparent;
  border: none;
  color: var(--texto2);
  font-size: 22px;
  cursor: pointer;
  line-height: 1;
  padding: 4px;
}
.btn-cerrar:hover { color: var(--texto); }

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  padding: 48px 20px;
  color: var(--texto2);
}
.empty-icono { font-size: 48px; margin-bottom: 12px; }
.empty-texto { font-size: 15px; }

/* ── SECCIÓN OCULTA ── */
.seccion { display: none; }
.seccion.activa { display: block; }

/* ── RESPONSIVE ── */
@media (max-width: 480px) {
  .kpi-bar { grid-template-columns: repeat(2, 1fr); }
  .grid-prensas { grid-template-columns: repeat(3, 1fr); }
  .logo { font-size: 18px; }
  .reloj { font-size: 15px; }
  .btn-reportar { padding: 8px 14px; font-size: 14px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">DYM <span>ANDON</span></div>
  <div class="header-right">
    <div class="reloj" id="reloj">--:--:--</div>
    <button class="btn-reportar" onclick="abrirModal()">+ REPORTAR</button>
  </div>
</header>

<!-- TABS -->
<div class="tabs">
  <div class="tab activa" onclick="cambiarTab('tablero', this)">Tablero</div>
  <div class="tab" onclick="cambiarTab('historial', this)">Historial</div>
</div>

<!-- KPI BAR -->
<div class="kpi-bar">
  <div class="kpi">
    <div class="kpi-num verde" id="kpi-ok">—</div>
    <div class="kpi-label">Operando</div>
  </div>
  <div class="kpi">
    <div class="kpi-num rojo" id="kpi-paro">—</div>
    <div class="kpi-label">Paros</div>
  </div>
  <div class="kpi">
    <div class="kpi-num amarillo" id="kpi-scrap">—</div>
    <div class="kpi-label">Scrap</div>
  </div>
  <div class="kpi">
    <div class="kpi-num cyan" id="kpi-ayuda">—</div>
    <div class="kpi-label">Ayuda</div>
  </div>
</div>

<!-- LEYENDA -->
<div class="leyenda">
  <div class="ley-item"><div class="ley-dot" style="background:var(--verde)"></div> Operando</div>
  <div class="ley-item"><div class="ley-dot" style="background:var(--rojo)"></div> Paro / Falla</div>
  <div class="ley-item"><div class="ley-dot" style="background:var(--amarillo)"></div> Scrap</div>
  <div class="ley-item"><div class="ley-dot" style="background:var(--cyan)"></div> Llamada de ayuda</div>
</div>

<!-- TABLERO -->
<div class="seccion activa" id="sec-tablero">
  <div class="contenido">
    <div class="grid-prensas" id="grid-prensas">
      <div class="empty"><div class="empty-icono">⏳</div><div class="empty-texto">Cargando prensas...</div></div>
    </div>
  </div>
</div>

<!-- HISTORIAL -->
<div class="seccion" id="sec-historial">
  <div class="contenido">
    <div class="historial-lista" id="historial-lista">
      <div class="empty"><div class="empty-icono">⏳</div><div class="empty-texto">Cargando historial...</div></div>
    </div>
  </div>
</div>

<!-- MODAL REPORTAR -->
<div class="overlay" id="overlay-reporte">
  <div class="modal">
    <button class="btn-cerrar" onclick="cerrarModal()">✕</button>
    <div class="modal-titulo">NUEVO REPORTE</div>
    <div class="modal-sub">Selecciona la prensa y el tipo de evento</div>

    <div class="campo">
      <label>Tipo de evento</label>
      <div class="tipo-btns">
        <div class="tipo-btn" id="btn-paro"  onclick="selTipo('paro')">
          <div class="tipo-icono">🔴</div>
          <div class="tipo-label">PARO / FALLA</div>
        </div>
        <div class="tipo-btn" id="btn-scrap" onclick="selTipo('scrap')">
          <div class="tipo-icono">🟡</div>
          <div class="tipo-label">SCRAP</div>
        </div>
        <div class="tipo-btn" id="btn-ayuda" onclick="selTipo('ayuda')">
          <div class="tipo-icono">🔵</div>
          <div class="tipo-label">PEDIR AYUDA</div>
        </div>
        <div class="tipo-btn" id="btn-ok"    onclick="selTipo('ok')">
          <div class="tipo-icono">🟢</div>
          <div class="tipo-label">REANUDAR / OK</div>
        </div>
      </div>
    </div>

    <div class="campo">
      <label>Prensa</label>
      <select id="sel-prensa">
        <option value="">— Selecciona prensa —</option>
      </select>
    </div>

    <div class="campo">
      <label>Tu nombre (opcional)</label>
      <input type="text" id="inp-operador" placeholder="Ej: Juan García" maxlength="50">
    </div>

    <div class="campo">
      <label>Descripción (opcional)</label>
      <textarea id="inp-desc" placeholder="Ej: Troquel roto, pieza defectuosa, necesito material..."></textarea>
    </div>

    <div class="modal-btns">
      <button class="btn-cancelar" onclick="cerrarModal()">CANCELAR</button>
      <button class="btn-enviar" id="btn-enviar" onclick="enviarReporte()">ENVIAR REPORTE</button>
    </div>
  </div>
</div>

<!-- MODAL DETALLE PRENSA -->
<div class="overlay" id="overlay-detalle">
  <div class="modal modal-detalle">
    <button class="btn-cerrar" onclick="cerrarDetalle()">✕</button>
    <div id="detalle-contenido"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  CONFIGURACIÓN SUPABASE
// ══════════════════════════════════════════════
const SUPABASE_URL = 'https://tqqvpmbfbyjtlfqwhtau.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRxcXZwbWJmYnlqdGxmcXdodGF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MjkxNjAsImV4cCI6MjA5MTQwNTE2MH0.yXvqsoGIthLQR1a-hFCkzdWd03PANhSjCAMcDqNREBA';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ══════════════════════════════════════════════
//  ESTADO GLOBAL
// ══════════════════════════════════════════════
let prensas = [];
let estadosPrensa = {};
let tipoSeleccionado = null;

// ══════════════════════════════════════════════
//  RELOJ
// ══════════════════════════════════════════════
function actualizarReloj() {
  const ahora = new Date();
  document.getElementById('reloj').textContent =
    ahora.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
setInterval(actualizarReloj, 1000);
actualizarReloj();

// ══════════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════════
function cambiarTab(seccion, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('activa'));
  document.querySelectorAll('.seccion').forEach(s => s.classList.remove('activa'));
  el.classList.add('activa');
  document.getElementById('sec-' + seccion).classList.add('activa');
  if (seccion === 'historial') cargarHistorial();
}

// ══════════════════════════════════════════════
//  CARGAR PRENSAS Y ESTADOS
// ══════════════════════════════════════════════
async function cargarDatos() {
  try {
    const { data: pData } = await db.from('prensas').select('*').order('numero');
    const { data: eData } = await db.from('estado_prensas').select('*');

    prensas = pData || [];
    estadosPrensa = {};
    (eData || []).forEach(e => { estadosPrensa[e.prensa_id] = e; });

    renderizarGrid();
    actualizarKPIs();
    poblarSelectPrensas();
  } catch (err) {
    mostrarToast('Error al conectar con Supabase', true);
  }
}

function renderizarGrid() {
  const grid = document.getElementById('grid-prensas');
  if (!prensas.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icono">⚠️</div><div class="empty-texto">No se encontraron prensas</div></div>';
    return;
  }

  grid.innerHTML = prensas.map(p => {
    const ep = estadosPrensa[p.id];
    const estado = ep ? ep.estado : 'ok';
    const tiempo = ep ? tiempoRelativo(ep.actualizado_en) : '';
    const iconos = { ok:'✅', paro:'🔴', scrap:'🟡', ayuda:'🔵' };

    return `
      <div class="prensa-card estado-${estado}" onclick="verDetalle(${p.id})">
        <div class="prensa-numero">${p.numero}</div>
        <div class="prensa-estado-dot"></div>
        <div class="prensa-nombre">${p.nombre}</div>
        <div class="prensa-tiempo">${tiempo}</div>
      </div>`;
  }).join('');
}

function actualizarKPIs() {
  const conteo = { ok: 0, paro: 0, scrap: 0, ayuda: 0 };
  prensas.forEach(p => {
    const ep = estadosPrensa[p.id];
    const estado = ep ? ep.estado : 'ok';
    conteo[estado] = (conteo[estado] || 0) + 1;
  });
  document.getElementById('kpi-ok').textContent    = conteo.ok    || 0;
  document.getElementById('kpi-paro').textContent  = conteo.paro  || 0;
  document.getElementById('kpi-scrap').textContent = conteo.scrap || 0;
  document.getElementById('kpi-ayuda').textContent = conteo.ayuda || 0;
}

function poblarSelectPrensas() {
  const sel = document.getElementById('sel-prensa');
  sel.innerHTML = '<option value="">— Selecciona prensa —</option>' +
    prensas.map(p => `<option value="${p.id}">${p.nombre}</option>`).join('');
}

// ══════════════════════════════════════════════
//  HISTORIAL
// ══════════════════════════════════════════════
async function cargarHistorial() {
  const lista = document.getElementById('historial-lista');
  lista.innerHTML = '<div class="empty"><div class="empty-icono">⏳</div><div class="empty-texto">Cargando...</div></div>';

  const { data } = await db
    .from('eventos')
    .select('*, prensas(numero, nombre)')
    .order('creado_en', { ascending: false })
    .limit(100);

  if (!data || !data.length) {
    lista.innerHTML = '<div class="empty"><div class="empty-icono">📋</div><div class="empty-texto">No hay eventos registrados aún</div></div>';
    return;
  }

  lista.innerHTML = data.map(ev => {
    const nombres = { paro: 'PARO', scrap: 'SCRAP', ayuda: 'AYUDA', ok: 'OK' };
    const p = ev.prensas;
    return `
      <div class="evento-item">
        <div class="evento-badge badge-${ev.tipo}">${nombres[ev.tipo] || ev.tipo.toUpperCase()}</div>
        <div class="evento-info">
          <div class="evento-prensa">${p ? p.nombre : 'Prensa ?'}</div>
          <div class="evento-desc">${ev.descripcion || (ev.operador ? 'Operador: ' + ev.operador : 'Sin descripción')}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <div class="evento-tiempo">${tiempoRelativo(ev.creado_en)}</div>
          ${ev.resuelto ? '<div class="resuelto-badge">✓ Resuelto</div>' : ''}
        </div>
      </div>`;
  }).join('');
}

// ══════════════════════════════════════════════
//  DETALLE PRENSA
// ══════════════════════════════════════════════
async function verDetalle(prensaId) {
  const prensa = prensas.find(p => p.id === prensaId);
  const ep = estadosPrensa[prensaId];
  const estado = ep ? ep.estado : 'ok';

  const etiquetas = { ok: '✅ OPERANDO', paro: '🔴 PARO / FALLA', scrap: '🟡 SCRAP', ayuda: '🔵 PIDIENDO AYUDA' };

  const { data: evts } = await db
    .from('eventos')
    .select('*')
    .eq('prensa_id', prensaId)
    .order('creado_en', { ascending: false })
    .limit(5);

  const evtsHtml = (evts && evts.length)
    ? evts.map(ev => `
        <div class="detalle-evento">
          <span class="evento-badge badge-${ev.tipo}" style="font-size:11px;padding:2px 8px">${ev.tipo.toUpperCase()}</span>
          &nbsp; ${ev.descripcion || 'Sin descripción'}
          <span style="float:right;font-size:11px;color:var(--texto2)">${tiempoRelativo(ev.creado_en)}</span>
        </div>`).join('')
    : '<div style="font-size:13px;color:var(--texto2);padding:8px 0">Sin eventos registrados</div>';

  document.getElementById('detalle-contenido').innerHTML = `
    <div class="detalle-header">
      <div class="detalle-num">${prensa.numero}</div>
      <div class="detalle-info">
        <h2>${prensa.nombre}</h2>
        <p>${prensa.area || 'Área de Estampado'}</p>
      </div>
    </div>
    <div class="detalle-estado ${estado}">${etiquetas[estado]}</div>
    <div style="margin-bottom:16px">
      <button class="btn-enviar" style="width:100%" onclick="cerrarDetalle();seleccionarPrensaYAbrir(${prensaId})">
        + REPORTAR EN ESTA PRENSA
      </button>
    </div>
    <div class="detalle-eventos">
      <h3>Últimos eventos</h3>
      ${evtsHtml}
    </div>`;

  document.getElementById('overlay-detalle').classList.add('activa');
}

function cerrarDetalle() {
  document.getElementById('overlay-detalle').classList.remove('activa');
}

function seleccionarPrensaYAbrir(prensaId) {
  abrirModal();
  setTimeout(() => {
    document.getElementById('sel-prensa').value = prensaId;
  }, 100);
}

// ══════════════════════════════════════════════
//  MODAL REPORTE
// ══════════════════════════════════════════════
function abrirModal() {
  tipoSeleccionado = null;
  document.querySelectorAll('.tipo-btn').forEach(b => b.className = 'tipo-btn');
  document.getElementById('inp-desc').value = '';
  document.getElementById('inp-operador').value = '';
  document.getElementById('overlay-reporte').classList.add('activa');
}

function cerrarModal() {
  document.getElementById('overlay-reporte').classList.remove('activa');
}

function selTipo(tipo) {
  tipoSeleccionado = tipo;
  document.querySelectorAll('.tipo-btn').forEach(b => b.className = 'tipo-btn');
  document.getElementById('btn-' + tipo).className = `tipo-btn sel-${tipo}`;
}

async function enviarReporte() {
  const prensaId = parseInt(document.getElementById('sel-prensa').value);
  const operador = document.getElementById('inp-operador').value.trim();
  const desc     = document.getElementById('inp-desc').value.trim();

  if (!tipoSeleccionado) { mostrarToast('Selecciona el tipo de evento', true); return; }
  if (!prensaId)         { mostrarToast('Selecciona la prensa', true); return; }

  const btnEnviar = document.getElementById('btn-enviar');
  btnEnviar.disabled = true;
  btnEnviar.textContent = 'ENVIANDO...';

  try {
    // Insertar evento
    await db.from('eventos').insert({
      prensa_id: prensaId,
      tipo: tipoSeleccionado,
      descripcion: desc || null,
      operador: operador || null
    });

    // Actualizar estado de la prensa
    await db.from('estado_prensas')
      .update({ estado: tipoSeleccionado, actualizado_en: new Date().toISOString() })
      .eq('prensa_id', prensaId);

    cerrarModal();
    mostrarToast('✅ Reporte enviado correctamente');
    await cargarDatos();

  } catch (err) {
    mostrarToast('Error al enviar. Revisa tu conexión.', true);
  }

  btnEnviar.disabled = false;
  btnEnviar.textContent = 'ENVIAR REPORTE';
}

// ══════════════════════════════════════════════
//  TIEMPO REAL (Supabase Realtime)
// ══════════════════════════════════════════════
function iniciarRealtime() {
  db.channel('andon-realtime')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'estado_prensas' }, () => {
      cargarDatos();
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'eventos' }, () => {
      cargarDatos();
    })
    .subscribe();
}

// ══════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════
function mostrarToast(msg, error = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (error ? ' error' : '');
  t.classList.add('visible');
  setTimeout(() => t.classList.remove('visible'), 3500);
}

// ══════════════════════════════════════════════
//  TIEMPO RELATIVO
// ══════════════════════════════════════════════
function tiempoRelativo(isoStr) {
  if (!isoStr) return '';
  const diff = Math.floor((Date.now() - new Date(isoStr)) / 1000);
  if (diff < 60)   return 'hace ' + diff + 's';
  if (diff < 3600) return 'hace ' + Math.floor(diff/60) + 'min';
  if (diff < 86400)return 'hace ' + Math.floor(diff/3600) + 'h';
  return 'hace ' + Math.floor(diff/86400) + 'd';
}

// ══════════════════════════════════════════════
//  CERRAR OVERLAY AL CLICK FUERA
// ══════════════════════════════════════════════
document.getElementById('overlay-reporte').addEventListener('click', function(e) {
  if (e.target === this) cerrarModal();
});
document.getElementById('overlay-detalle').addEventListener('click', function(e) {
  if (e.target === this) cerrarDetalle();
});

// ══════════════════════════════════════════════
//  ARRANQUE
// ══════════════════════════════════════════════
cargarDatos();
iniciarRealtime();

// Refrescar cada 30 segundos por si acaso
setInterval(cargarDatos, 30000);
</script>

</html>
